name: CD Main

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pbi-embed-api

jobs:
  api-build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_digest: ${{ steps.meta.outputs.image_digest }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify vendored Sigfarm auth SDK checksums
        run: node vendor/sigfarm-auth-platform/verify-checksums.js
      - name: Normalize image name
        shell: bash
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY_OWNER,,}/pbi-embed-api" >> "$GITHUB_ENV"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare vendored SDKs for Docker context
        shell: bash
        run: |
          mkdir -p apps/api/vendor
          rm -rf apps/api/vendor/sigfarm-auth-platform
          cp -R vendor/sigfarm-auth-platform apps/api/vendor/
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Set image outputs
        id: meta
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  api-staging:
    runs-on: ubuntu-latest
    needs: api-build
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json
      - name: Install
        working-directory: apps/api
        run: npm ci
      - name: Prisma generate
        working-directory: apps/api
        run: npx prisma generate
      - name: Migrate DB (staging)
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx prisma migrate deploy
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate Sigfarm Auth env (staging)
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ secrets.AZURE_CONTAINER_APP_NAME_STAGING }}"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
          ENV_NAMES="$(az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query "properties.template.containers[0].env[].name" -o tsv)"
          for REQUIRED_ENV in SIGFARM_AUTH_ISSUER SIGFARM_AUTH_AUDIENCE SIGFARM_AUTH_JWKS_URL; do
            if ! printf "%s\n" "$ENV_NAMES" | grep -Fxq "$REQUIRED_ENV"; then
              echo "::error::Container App '$APP_NAME' is missing required env '$REQUIRED_ENV'."
              exit 1
            fi
          done
      - name: Deploy to Azure Container Apps (staging)
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME_STAGING }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.api-build.outputs.image }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
      - name: Health check (staging)
        run: |
          curl --fail --show-error --silent "${{ secrets.STAGING_API_BASE_URL }}/health"
          curl --fail --show-error --silent "${{ secrets.STAGING_API_BASE_URL }}/ready"

  api-prod:
    runs-on: ubuntu-latest
    needs: [api-staging, api-build]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json
      - name: Install
        working-directory: apps/api
        run: npm ci
      - name: Prisma generate
        working-directory: apps/api
        run: npx prisma generate
      - name: Migrate DB (prod)
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate Sigfarm Auth env (prod)
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ secrets.AZURE_CONTAINER_APP_NAME_PROD }}"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"
          ENV_NAMES="$(az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query "properties.template.containers[0].env[].name" -o tsv)"
          for REQUIRED_ENV in SIGFARM_AUTH_ISSUER SIGFARM_AUTH_AUDIENCE SIGFARM_AUTH_JWKS_URL; do
            if ! printf "%s\n" "$ENV_NAMES" | grep -Fxq "$REQUIRED_ENV"; then
              echo "::error::Container App '$APP_NAME' is missing required env '$REQUIRED_ENV'."
              exit 1
            fi
          done
      - name: Deploy to Azure Container Apps (prod)
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME_PROD }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.api-build.outputs.image_digest }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
      - name: Health check (prod)
        run: |
          curl --fail --show-error --silent "${{ secrets.PROD_API_BASE_URL }}/health"
          curl --fail --show-error --silent "${{ secrets.PROD_API_BASE_URL }}/ready"

  web-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      NODE_VERSION: "20.19.6"
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_STAGING }}
      VITE_SIGFARM_AUTH_API_BASE_URL: https://api-testauth.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_PORTAL_BASE_URL: https://testauth.sigfarmintelligence.com
      VITE_SIGFARM_APP_BASE_URL: https://testbi.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_ALLOWED_RETURN_ORIGINS: https://testbi.sigfarmintelligence.com,https://testauth.sigfarmintelligence.com,https://testlandwatch.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_DEFAULT_RETURN_TO: https://testbi.sigfarmintelligence.com/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate web env (staging)
        shell: bash
        run: |
          set -euo pipefail
          for REQUIRED_ENV in \
            VITE_API_BASE_URL \
            VITE_SIGFARM_AUTH_API_BASE_URL \
            VITE_SIGFARM_AUTH_PORTAL_BASE_URL \
            VITE_SIGFARM_APP_BASE_URL \
            VITE_SIGFARM_AUTH_ALLOWED_RETURN_ORIGINS \
            VITE_SIGFARM_AUTH_DEFAULT_RETURN_TO; do
            if [ -z "${!REQUIRED_ENV:-}" ]; then
              echo "::error::Missing required env '$REQUIRED_ENV' for web staging deploy."
              exit 1
            fi
          done
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web"
          output_location: "dist"

  web-prod:
    runs-on: ubuntu-latest
    needs: [web-staging, api-prod]
    environment: production
    env:
      NODE_VERSION: "20.19.6"
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
      VITE_SIGFARM_AUTH_API_BASE_URL: https://api-auth.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_PORTAL_BASE_URL: https://auth.sigfarmintelligence.com
      VITE_SIGFARM_APP_BASE_URL: https://bi.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_ALLOWED_RETURN_ORIGINS: https://bi.sigfarmintelligence.com,https://auth.sigfarmintelligence.com,https://landwatch.sigfarmintelligence.com
      VITE_SIGFARM_AUTH_DEFAULT_RETURN_TO: https://bi.sigfarmintelligence.com/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate web env (prod)
        shell: bash
        run: |
          set -euo pipefail
          for REQUIRED_ENV in \
            VITE_API_BASE_URL \
            VITE_SIGFARM_AUTH_API_BASE_URL \
            VITE_SIGFARM_AUTH_PORTAL_BASE_URL \
            VITE_SIGFARM_APP_BASE_URL \
            VITE_SIGFARM_AUTH_ALLOWED_RETURN_ORIGINS \
            VITE_SIGFARM_AUTH_DEFAULT_RETURN_TO; do
            if [ -z "${!REQUIRED_ENV:-}" ]; then
              echo "::error::Missing required env '$REQUIRED_ENV' for web production deploy."
              exit 1
            fi
          done
      - name: Deploy to Azure Static Web Apps (prod)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web"
          output_location: "dist"
